<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invoices — InvoiceOCR</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="layout">
<div class="main-content">
  <div class="topbar">
    <div><span class="topbar-title">Invoices</span><span class="topbar-sub">All processed documents</span></div>
    <div class="topbar-right">
      <button class="btn btn-outline btn-sm" onclick="load()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
      <a href="analyze.html" class="btn btn-primary btn-sm">+ New Invoice</a>
    </div>
  </div>

  <div class="page-body">
    <div class="card">
      <div class="card-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--c-ink3)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
        <div class="card-title">All Invoices</div>
        <span class="badge badge-gray" id="countBadge" style="margin-left:auto;">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Invoice ID</th><th>File Name</th><th>Vendor</th>
              <th>Amount</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="7">
              <div class="empty-state" style="padding:36px;">
                <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>
                <div class="empty-title">No invoices yet</div>
                <div class="empty-desc">Analyze an invoice to see it here.</div>
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Detail Modal -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(2px);">
  <div style="background:#fff;border-radius:16px;width:620px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);animation:fadeSlide .18s ease;">
    <div style="padding:20px 22px 16px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:12px;">
      <div style="width:38px;height:38px;background:var(--c-blue-lt);border-radius:9px;display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--c-blue)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
      </div>
      <div>
        <div id="modalTitle" style="font-size:15px;font-weight:700;color:var(--c-ink);">Invoice Details</div>
        <div id="modalId" style="font-size:11px;font-family:monospace;color:var(--c-ink3);margin-top:1px;"></div>
      </div>
      <button onclick="closeModal()" style="margin-left:auto;background:transparent;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--c-ink3);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="padding:20px;">
      <div class="tab-bar">
        <button class="tab-btn active" id="dtab-fields" onclick="switchDTab('fields')">Fields</button>
        <button class="tab-btn" id="dtab-raw" onclick="switchDTab('raw')">JSON</button>
      </div>
      <div class="tab-panel active" id="dpFields"><div id="dFieldGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"></div></div>
      <div class="tab-panel" id="dpRaw"><div id="dRawJson"></div></div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid var(--c-border);background:#fafbfc;border-radius:0 0 16px 16px;display:flex;gap:8px;">
      <a id="modalValidateBtn" href="#" class="btn btn-outline btn-sm">Validate</a>
      <a id="modalFeedbackBtn" href="#" class="btn btn-outline btn-sm">Feedback</a>
      <button onclick="closeModal()" class="btn btn-primary btn-sm" style="margin-left:auto;">Close</button>
    </div>
  </div>
</div>
<style>@keyframes fadeSlide{from{opacity:0;transform:scale(.97) translateY(6px)}to{opacity:1;transform:none}}</style>

<script src="shared.js"></script>
<script>
async function load() {
  try {
    const r = await api('GET', '/api/invoices');
    if (!r.ok) { toast('Failed: '+r.status,'err'); return; }
    const d = await r.json();
    const invs = Array.isArray(d) ? d : (d.invoices||d.items||d.data||[]);
    document.getElementById('countBadge').textContent = invs.length + ' invoices';
    const tbody = document.getElementById('tbody');
    if (!invs.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state" style="padding:36px;"><div class="empty-title">No invoices yet</div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = invs.map(inv => {
      const id = inv.id || inv._id || '';
      const nm = inv.fileName || inv.name || '—';
      const ve = inv.vendorName || inv.fields?.vendorName?.value || '—';
      const am = inv.totalAmount || inv.fields?.totalAmount?.value || '—';
      const dt = inv.invoiceDate || inv.fields?.invoiceDate?.value || '—';
      const st = inv.status || 'processed';
      return `<tr>
        <td class="td-mono">${id.slice(0,14)}…</td>
        <td><span style="font-weight:550;">${nm}</span></td>
        <td>${ve}</td>
        <td class="td-mono">${am}</td>
        <td class="td-mono">${dt}</td>
        <td>${statusBadge(st)}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-ghost btn-sm" onclick="openDetail('${id}')">View</button>
          <a href="validate.html?id=${id}" class="btn btn-ghost btn-sm">Validate</a>
        </td>
      </tr>`;
    }).join('');
    toast(`${invs.length} invoice(s) loaded`, 'ok');
  } catch(e) { toast('Error: '+e.message,'err'); }
}

async function openDetail(id) {
  document.getElementById('modalTitle').textContent = 'Loading…';
  document.getElementById('modalId').textContent    = id;
  document.getElementById('modal').style.display   = 'flex';
  document.getElementById('modalValidateBtn').href  = `validate.html?id=${id}`;
  document.getElementById('modalFeedbackBtn').href  = `feedback.html?id=${id}`;
  try {
    const r = await api('GET', `/api/invoices/${id}`);
    if (!r.ok) return;
    const data = await r.json();
    document.getElementById('modalTitle').textContent = data.fileName || 'Invoice';
    document.getElementById('dRawJson').innerHTML = `<div class="json-box"><div class="json-box-header"><span class="json-box-label">RESPONSE</span></div><div class="json-body">${jsonHL(data)}</div></div>`;
    const fields = extractFields(data);
    const entries = Object.entries(fields);
    document.getElementById('dFieldGrid').innerHTML = entries.length
      ? entries.map(([k, {value, confidence}]) => `<div style="background:var(--c-bg);border:1px solid var(--c-border);border-radius:8px;padding:10px 12px;">
          <div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--c-ink3);margin-bottom:4px;">${k}</div>
          <div style="font-size:13px;font-weight:600;color:var(--c-ink);font-family:monospace;">${value||'—'}</div>
          ${confPill(confidence) ? `<div style="margin-top:3px;">${confPill(confidence)}</div>` : ''}
        </div>`).join('')
      : '<div style="color:var(--c-ink3);font-size:13px;grid-column:span 2;">No fields extracted.</div>';
  } catch(e) { toast('Error: '+e.message,'err'); }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function switchDTab(t) {
  ['fields','raw'].forEach(x => {
    document.getElementById('dp'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===t);
    document.getElementById('dtab-'+x).classList.toggle('active', x===t);
  });
}

load();
</script>
</body>
</html>
